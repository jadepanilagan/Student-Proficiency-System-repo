<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPS – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root { --maroon:#8B1A1A; --maroon-dark:#5A1010; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-box {
      background: #fff; border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }
    .brand-name { font-size: 26px; font-weight: 800; color: var(--maroon); }
    .brand-sub  { font-size: 13px; color: #64748B; }
    .form-label { font-size: 13px; font-weight: 600; color: #0F172A; margin-bottom: 6px; }
    .form-control {
      border: 1.5px solid #E2E8F0; border-radius: 8px;
      padding: 11px 14px; font-size: 14px;
    }
    .form-control:focus { border-color: var(--maroon); box-shadow: 0 0 0 3px rgba(139,26,26,0.15); }
    .btn-login {
      background: var(--maroon); color: #fff; border: none; border-radius: 10px;
      width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-top: 8px;
      box-shadow: 0 4px 12px rgba(139, 26, 26, 0.2);
    }
    .btn-login:hover { background: #6f1515; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: var(--maroon); font-size: 13px; font-weight: 600; text-decoration: none;}
    .input-group-text { background: #F8FAFC; border: 1.5px solid #E2E8F0; border-left: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="text-center mb-4">
      <div class="brand-name">EduSpace</div>
      <div class="brand-sub">Student Proficiency System</div>
    </div>

    <h5 class="fw-bold mb-1" style="color:#0F172A;">Sign in to your account</h5>
    <p class="text-muted mb-4" style="font-size:13px;">Enter your credentials to continue.</p>

    <div id="errorAlert" class="alert alert-danger d-none" style="font-size: 13px; padding: 10px;"></div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control" id="loginEmail" placeholder="you@school.edu" />
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <input type="password" class="form-control" id="passInput" placeholder="••••••••" style="border-right:none;" />
        <span class="input-group-text" onclick="togglePass()" style="cursor:pointer;">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </span>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="form-check mb-0">
        <input class="form-check-input" type="checkbox" id="remember" />
        <label class="form-check-label" for="remember" style="font-size:13px;">Remember me</label>
      </div>
      <a href="#" style="font-size:13px; color:var(--maroon); text-decoration:none; font-weight:600;">Forgot password?</a>
    </div>

    <button class="login-box btn-login" onclick="doLogin()">Sign In</button>

    <div class="back-link">
      <a href="16-signup.html">Don't have an account? Sign up</a>
    </div>
  </div>

  <script>
    function togglePass() {
      const inp = document.getElementById('passInput');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') { 
        inp.type = 'text'; 
        ico.className = 'bi bi-eye-slash'; 
      } else { 
        inp.type = 'password'; 
        ico.className = 'bi bi-eye'; 
      }
    }

    function doLogin() {
      const emailInput = document.getElementById('loginEmail').value;
      const passInput = document.getElementById('passInput').value;
      const errorAlert = document.getElementById('errorAlert');

      const savedEmail = localStorage.getItem('sps_email');
      const savedPass = localStorage.getItem('sps_password');
      const savedRole = localStorage.getItem('sps_role');

      if (emailInput === savedEmail && passInput === savedPass) {
        if (savedRole === 'student') {
          window.location.href = '17-student-personal.html';
        } else if (savedRole === 'teacher') {
          window.location.href = '07-teacher-dashboard.html';
        }
      } else {
        errorAlert.textContent = "Invalid email or password. Please make sure you signed up first.";
        errorAlert.classList.remove('d-none');
      }
    }
  </script>
</body>
</html>
