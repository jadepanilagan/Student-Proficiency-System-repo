{% extends 'base.html' %}
{% block content %}
<div class="form-card">
    <h2>Add Activity to {{ topic.title }}</h2>
    <form method="post" class="custom-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn-primary">Create</button>
            <a href="{% url 'lesson_plan_view' topic.lesson_plan.subject.id %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
