{% extends 'base.html' %}
{% block content %}
<div class="form-card">
    <h2>Add Activity to a Task</h2>
    {% if form.fields.topic.queryset.exists %}
    <form method="post" class="custom-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn-primary">Create</button>
            <a href="{% url 'task_list' %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
    {% else %}
    <p class="empty-state-sm">You need a subject and topic first. Go to Subjects to create one.</p>

    {% endif %}
</div>
{% endblock %}
