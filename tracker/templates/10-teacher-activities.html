<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPS – Activities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    .avatar.maroon-theme {
      background: #8B1A1A !important;
      color: #ffffff !important;
    }
    .text-maroon {
      color: #8B1A1A !important;
    }
    .bg-maroon-light {
      background-color: rgba(139, 26, 26, 0.05) !important;
    }
    .btn-maroon {
      background-color: #8B1A1A !important;
      color: #ffffff !important;
    }
    .btn-maroon:hover { background-color:#6B1212 !important; }
    .btn-outline-maroon {
      border: 1px solid #8B1A1A !important;
      color: #8B1A1A !important;
      background: transparent;
    }
    .btn-outline-maroon:hover {
      background-color: #8B1A1A !important;
      color: white !important;
    }
    .btn, button { cursor: pointer !important; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo-text">EduSpace</div>
    <div class="logo-sub">Teacher Portal</div>
  </div>
  <nav class="sidebar-nav">
    <a href="07-teacher-dashboard.html"><span class="nav-icon"><i class="bi bi-speedometer2"></i></span> Dashboard</a>
    <a href="08-teacher-classes.html"><span class="nav-icon"><i class="bi bi-people-fill"></i></span> My Classes</a>
    <a href="09-teacher-lesson-plans.html"><span class="nav-icon"><i class="bi bi-journal-text"></i></span> Lesson Plans</a>
    <a href="10-teacher-activities.html" class="active"><span class="nav-icon"><i class="bi bi-list-check"></i></span> Activities</a>
    <a href="15-teacher-forum.html"><span class="nav-icon"><i class="bi bi-chat-dots-fill"></i></span> Forum</a>
    <a href="11-teacher-profile.html"><span class="nav-icon"><i class="bi bi-person-fill"></i></span> Profile</a>
  </nav>
  <div class="sidebar-user">
    <div class="avatar maroon-theme">RS</div>
    <div class="user-info"><div class="user-name">Mr. Santos</div><div class="user-role">Teacher</div></div>
    <button class="logout-btn" onclick="location.href='01-role-selection.html'"><i class="bi bi-box-arrow-right"></i></button>
  </div>
</aside>

<header class="topbar d-flex justify-content-between align-items-center">
  <div class="topbar-title">Activities</div>
  
  <div class="topbar-right d-flex align-items-center gap-3">
    <!-- Floating Notifications -->
    <div class="dropdown">
      <button class="notif-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="border:none; background:transparent;">
        <i class="bi bi-bell"></i>
        <span class="notif-badge" style="background:#8B1A1A;">2</span>
      </button>
      <div class="dropdown-menu dropdown-menu-end shadow p-0" style="width: 320px; border-radius: 12px; border: 1px solid #E2E8F0; margin-top: 15px;">
        <div class="p-3" style="background: #F8FAFF; border-bottom: 1px solid #E2E8F0; border-radius: 12px 12px 0 0;">
          <h6 class="mb-0 fw-bold" style="color: #0F172A;">Notifications</h6>
        </div>
        <div class="list-group list-group-flush" style="max-height: 300px; overflow-y: auto;">
          <a href="#" class="list-group-item list-group-item-action p-3">
            <div class="d-flex gap-3 align-items-center">
              <div class="stat-icon bg-maroon-light d-flex align-items-center justify-content-center" style="width:36px;height:36px;border-radius:10px;flex-shrink:0;font-size:16px;">
                <i class="bi bi-file-earmark-arrow-up text-maroon"></i>
              </div>
              <div>
                <p class="mb-0 fw-bold" style="font-size: 13px; color: #0F172A;">Assignment Submitted</p>
                <p class="mb-0 text-muted" style="font-size: 12px;">3 students submitted Quiz 1.</p>
              </div>
            </div>
          </a>
        </div>
        <div class="p-2 text-center" style="border-top: 1px solid #E2E8F0;">
          <a href="#" style="font-size: 12px; font-weight: 700; color: #8B1A1A; text-decoration: none;">Mark all as read</a>
        </div>
      </div>
    </div>

    <!-- Clickable Avatar -->
    <div class="avatar maroon-theme" onclick="location.href='11-teacher-profile.html'" style="width:34px;height:34px;font-size:13px; cursor:pointer;" title="View Profile">RS</div>
  </div>
</header>

<main class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="page-title">Activities</h1>
      <p class="text-muted text-sm mt-1">Create and manage graded activities per topic.</p>
    </div>
    <button class="btn btn-maroon fw-bold" data-bs-toggle="modal" data-bs-target="#addActModal" style="padding: 8px 16px; border-radius: 8px;">
      <i class="bi bi-plus-lg me-1"></i> Add Activity
    </button>
  </div>

  <div class="row g-3" id="actGrid"></div>
</main>

<!-- Add Activity Modal -->
<div class="modal fade" id="addActModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header text-white" style="border-bottom:1px solid #E2E8F0; background:#8B1A1A;">
        <h5 class="modal-title fw-bold"><i class="bi bi-file-earmark-plus me-2"></i>Add New Activity</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="form-label">Activity Title</label>
          <input class="form-control" placeholder="e.g. Quiz 4 — Quadratics" />
        </div>
        <div class="row g-2 mb-3">
          <div class="col">
            <label class="form-label">Type</label>
            <select class="form-select">
              <option>Quiz</option>
              <option>Assignment</option>
              <option>Lab Exercise</option>
              <option>Project</option>
            </select>
          </div>
          <div class="col">
            <label class="form-label">Points</label>
            <input class="form-control" type="number" placeholder="100" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Linked Topic</label>
          <select class="form-select">
            <option>Topic 1 – Number Systems</option>
            <option>Topic 2 – Algebraic Expressions</option>
            <option>Topic 4 – Quadratic Equations</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Due Date</label>
          <input class="form-control" type="date" />
        </div>
      </div>
      <div class="modal-footer border-0 p-3">
        <button class="btn btn-light border fw-bold text-dark" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-maroon fw-bold ms-2" data-bs-dismiss="modal">Save Activity</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const acts = [
    { title:'Quiz 1 – Number Systems',    type:'Quiz',       pts:80,  submitted:30, total:32, icon:'bi-file-earmark-text', color:'#8B1A1A' },
    { title:'Assignment 1 – Expressions', type:'Assignment', pts:60,  submitted:28, total:32, icon:'bi-pencil-square',     color:'#8B1A1A' },
    { title:'Lab Exercise 1',             type:'Lab',        pts:100, submitted:32, total:32, icon:'bi-code-slash',        color:'#8B1A1A' },
    { title:'Quiz 2 – Linear Eq.',        type:'Quiz',       pts:80,  submitted:25, total:32, icon:'bi-file-earmark-text', color:'#8B1A1A' },
    { title:'Project 1 – Functions',      type:'Project',    pts:150, submitted:18, total:32, icon:'bi-folder2-open',      color:'#8B1A1A' },
    { title:'Quiz 3 – Quadratics',        type:'Quiz',       pts:80,  submitted:0,  total:32, icon:'bi-file-earmark-text', color:'#8B1A1A' },
  ];

  const typeColor = { Quiz:'badge-red', Assignment:'badge-blue', Lab:'badge-green', Project:'badge-amber' };
  const grid = document.getElementById('actGrid');
  acts.forEach(a => {
    const pct = Math.round((a.submitted/a.total)*100);
    grid.innerHTML += `
      <div class="col-md-6 col-lg-4 mb-2">
        <div class="card h-100 shadow-sm p-4">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div class="stat-icon bg-maroon-light d-flex align-items-center justify-content-center" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;">
              <i class="bi ${a.icon} text-maroon" style="font-size:18px;"></i>
            </div>
            <span class="badge ${typeColor[a.type]}">${a.type}</span>
          </div>
          <div style="font-size:15px;font-weight:700;color:#0F172A;margin-bottom:4px;">${a.title}</div>
          <div class="text-muted text-sm mb-3"><i class="bi bi-lightning-charge me-1"></i>${a.pts} points</div>

          <div class="d-flex justify-content-between mb-1">
            <span class="text-sm text-muted">Submissions</span>
            <span class="text-sm fw-bold text-maroon">${a.submitted}/${a.total}</span>
          </div>
          <div class="progress mb-3" style="height:6px;">
            <div class="progress-bar" style="width:${pct}%;background:#8B1A1A;"></div>
          </div>
          <div class="d-flex gap-2 mt-auto">
            <button class="btn btn-outline-maroon btn-sm fw-bold" style="flex:1;font-size:13px;padding:8px;">View Scores</button>
            <button class="btn btn-outline-secondary btn-sm" style="padding:8px 12px;"><i class="bi bi-pencil"></i></button>
          </div>
        </div>
      </div>`;
  });
</script>
</body>
</html>
