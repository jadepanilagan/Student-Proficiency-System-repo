<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPS – Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root { --navy:#1B2A4A; --red:#8B1A1A; --amber:#F5A623; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1B2A4A 0%, #243558 60%, #1B2A4A 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px 0;
    }
    .login-box {
      background: #fff; border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 480px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    .brand-name { font-size: 26px; font-weight: 800; color: var(--navy); }
    .brand-sub  { font-size: 13px; color: #6B7280; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .form-control {
      border: 1.5px solid #E2E8F0; border-radius: 8px;
      padding: 11px 14px; font-size: 14px;
    }
    .form-control:focus { border-color: var(--navy); box-shadow: none; }
    .btn-login {
      background: var(--red); color: #fff; border: none; border-radius: 10px;
      width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-top: 16px;
    }
    .btn-login:hover { background: #6f1515; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: var(--navy); font-size: 13px; font-weight: 600; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="text-center mb-4">
      <div class="brand-name">EduSpace</div>
      <div class="brand-sub">Create your account</div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-sm-6">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" id="fName" placeholder="Jade" />
      </div>
      <div class="col-sm-6">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-control" id="lName" placeholder="Panilagan" />
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control" id="regEmail" placeholder="you@school.edu" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="regPass" placeholder="••••••••" required />
    </div>

    <!-- Role selector -->
    <div class="mb-4">
      <label class="form-label">I am a...</label>
      <div class="d-flex gap-2">
        <button class="btn btn-sm w-50 role-toggle active-role" id="btnRegStudent"
                onclick="setRegRole('student')" style="border-radius:8px; font-weight:600; font-size:13px; border:1.5px solid #8B1A1A; background:#FFF5F5; color:#8B1A1A;">
          <i class="bi bi-mortarboard-fill me-1"></i> Student
        </button>
        <button class="btn btn-sm w-50 role-toggle" id="btnRegTeacher"
                onclick="setRegRole('teacher')" style="border-radius:8px; font-weight:600; font-size:13px; border:1.5px solid #E2E8F0; color:#6B7280;">
          <i class="bi bi-book-fill me-1"></i> Teacher
        </button>
      </div>
    </div>

    <button class="btn-login" onclick="registerUser()">Create Account</button>

    <div class="back-link">
      <a href="02-login.html">Already have an account? Sign in</a>
    </div>
  </div>

  <script>
    let regRole = 'student';
    
    function setRegRole(r) {
      regRole = r;
      const s = document.getElementById('btnRegStudent');
      const t = document.getElementById('btnRegTeacher');
      if (r === 'student') {
        s.style.cssText = 'border-radius:8px;font-weight:600;font-size:13px;border:1.5px solid #8B1A1A;background:#FFF5F5;color:#8B1A1A;width:50%';
        t.style.cssText = 'border-radius:8px;font-weight:600;font-size:13px;border:1.5px solid #E2E8F0;color:#6B7280;width:50%';
      } else {
        t.style.cssText = 'border-radius:8px;font-weight:600;font-size:13px;border:1.5px solid #1B2A4A;background:#F0F4FF;color:#1B2A4A;width:50%';
        s.style.cssText = 'border-radius:8px;font-weight:600;font-size:13px;border:1.5px solid #E2E8F0;color:#6B7280;width:50%';
      }
    }

    function registerUser() {
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPass').value;
      const fName = document.getElementById('fName').value;

      if (!email || !pass) {
        alert("Please enter a valid email and password.");
        return;
      }

      // Save credentials and role to the browser's Local Storage
      localStorage.setItem('sps_email', email);
      localStorage.setItem('sps_password', pass);
      localStorage.setItem('sps_role', regRole);
      localStorage.setItem('sps_name', fName);

      alert("Account created successfully! Please log in.");
      window.location.href = '02-login.html'; 
    }
  </script>
</body>
</html>
